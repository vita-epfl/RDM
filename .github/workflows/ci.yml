name: ci
on: [push, pull_request]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal CPU deps
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy pyyaml matplotlib einops tqdm pytest
          pip install -e . --no-deps
      - name: Quick smoke tests (no weights / no network / CPU)
        run: |
          pytest -q \
            tests/test_kernel_math.py \
            tests/test_panel_split.py \
            tests/test_representation.py \
            tests/test_generators.py \
            tests/test_train.py \
            tests/test_offobjective_floor.py \
            tests/test_toy.py \
            tests/test_paper_fixtures.py \
            tests/test_eval_harness.py \
            tests/test_refprep.py \
            tests/test_flux_eval_wiring.py
